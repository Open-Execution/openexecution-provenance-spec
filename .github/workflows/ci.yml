name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sdk-js-test:
    name: JS SDK Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Verify SDK syntax
        run: node -c sdk/js/src/verify.js
      - name: Verify types exist
        run: test -f sdk/js/src/types.d.ts

  sdk-python-test:
    name: Python SDK Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.10', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install SDK
        run: cd sdk/python && pip install -e .
      - name: Verify import
        run: python -c "from openexecution_verify import OpenExecutionVerifier; print('SDK loaded successfully')"

  schema-validate:
    name: Schema Validation
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: oe_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: spec_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Validate schema-spec.sql
        run: PGPASSWORD=test_password psql -h localhost -U oe_test -d spec_test -f schema/schema-spec.sql
